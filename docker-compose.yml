services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - backend_data:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/app.db
      - JWT_SECRET=change-me-in-production
      - CORS_ORIGINS=http://localhost
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: always

volumes:
  backend_data:
